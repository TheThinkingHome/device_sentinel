name: Feature request
description: An idea for what Device Sentinel should do.
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: The problem it solves
      description: What real situation in your home does this address? Concrete beats abstract.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: What you propose
    validations:
      required: true
  - type: markdown
    attributes:
      value: |
        Note: Device Sentinel is pre-release and built in strict steps. Ideas that fit the
        design land in the queue; the design document rules. Detection accuracy comes first,
        everything else after.
