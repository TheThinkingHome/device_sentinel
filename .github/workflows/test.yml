name: Tests


# Least privilege: these jobs only read the checked-out code, so
# the token is held to read-only. CodeQL flags a workflow with no
# permissions block because it inherits the repository default,
# which can be broader than the work requires.
permissions:
  contents: read

on:
  push:
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install test harness
        run: pip install -r requirements_test.txt
      - name: Run the suite
        run: python -m pytest tests/ -q
